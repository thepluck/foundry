name: fork-release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release"
        required: true
        default: "v1.7.1-json-decode.1"
      publish:
        description: "Publish the release after all assets upload"
        required: true
        default: true
        type: boolean

permissions: {}

env:
  CARGO_TERM_COLOR: always
  RUST_PROFILE: dist
  RUST_FEATURES: aws-kms,gcp-kms,turnkey,cli,asm-keccak,js-tracer

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      tag_name: ${{ inputs.tag }}
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ inputs.tag }}
        shell: bash
        run: |
          set -euo pipefail

          if release_json="$(gh release view "$TAG_NAME" --json isDraft 2>/dev/null)"; then
            is_draft="$(printf '%s' "$release_json" | grep -o '"isDraft":[^,}]*' | cut -d: -f2 | tr -d ' ')"
            if [[ "$is_draft" == "true" ]]; then
              echo "Draft release $TAG_NAME already exists; reusing it."
              exit 0
            fi
            echo "::error::Release $TAG_NAME is already published; refusing to mutate it."
            exit 1
          fi

          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          Fork release based on foundry-rs/foundry v1.7.1 with JSON internal trace decoding enabled when both \`forge test --json\` and \`--decode-internal\` are used.

          GitHub automatically attaches the source code archives for this tag. Binary archives contain \`forge\`, \`cast\`, \`anvil\`, and \`chisel\`.
          EOF

          gh release create "$TAG_NAME" \
            --draft \
            --verify-tag \
            --title "$TAG_NAME" \
            --notes-file "$notes_file"

  release:
    name: release ${{ matrix.platform }}_${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            svm_target_platform: linux-amd64
            platform: linux
            arch: amd64
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            svm_target_platform: linux-amd64
            platform: alpine
            arch: amd64
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            svm_target_platform: linux-aarch64
            platform: linux
            arch: arm64
          - runner: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            svm_target_platform: linux-aarch64
            platform: alpine
            arch: arm64
          - runner: macos-15-intel
            target: x86_64-apple-darwin
            svm_target_platform: macosx-amd64
            platform: darwin
            arch: amd64
          - runner: macos-14
            target: aarch64-apple-darwin
            svm_target_platform: macosx-aarch64
            platform: darwin
            arch: arm64
          - runner: windows-2022
            target: x86_64-pc-windows-msvc
            svm_target_platform: windows-amd64
            platform: win32
            arch: amd64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag_name }}
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: rui314/setup-mold@v1
        if: runner.os == 'Linux'

      - name: Install cross
        if: contains(matrix.target, 'musl')
        shell: bash
        run: |
          cargo install cross --locked \
            --git https://github.com/cross-rs/cross \
            --rev baf457efc2555225af47963475bd70e8d2f5993f

      - name: Install GNU tar
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if ! command -v gtar >/dev/null 2>&1; then
            brew install gnu-tar
          fi

      - name: Build binaries
        env:
          SVM_TARGET_PLATFORM: ${{ matrix.svm_target_platform }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail

          flags=(--locked --target "$TARGET" --profile "$RUST_PROFILE" --bins
            --no-default-features --features "$RUST_FEATURES")

          if [[ "$TARGET" != *msvc* && "$TARGET" != "aarch64-unknown-linux-gnu" ]]; then
            flags+=(--features jemalloc)
          fi

          if [[ "$TARGET" == *-musl ]]; then
            cross build "${flags[@]}"
          else
            cargo build "${flags[@]}"
          fi

          ext=""
          [[ "$TARGET" == *windows* ]] && ext=".exe"

          out_dir="target/$TARGET/$RUST_PROFILE"
          for name in anvil cast chisel forge; do
            bin="$out_dir/$name$ext"
            "$bin" --version
          done

      - name: Archive binaries
        id: archive
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
          PLATFORM_NAME: ${{ matrix.platform }}
          ARCH: ${{ matrix.arch }}
        shell: bash
        run: |
          set -euo pipefail

          base="foundry_${TAG_NAME}_${PLATFORM_NAME}_${ARCH}"
          out_dir="target/$TARGET/$RUST_PROFILE"

          if [[ "$PLATFORM_NAME" == "win32" ]]; then
            archive="$base.zip"
            (cd "$out_dir" && 7z a -tzip "$GITHUB_WORKSPACE/$archive" forge.exe cast.exe anvil.exe chisel.exe)
          elif [[ "$PLATFORM_NAME" == "darwin" ]]; then
            archive="$base.tar.gz"
            gtar -czvf "$archive" -C "$out_dir" forge cast anvil chisel
          else
            archive="$base.tar.gz"
            tar -czvf "$archive" -C "$out_dir" forge cast anvil chisel
          fi

          checksum="$base.sha256"
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$archive" > "$checksum"
          else
            shasum -a 256 "$archive" > "$checksum"
          fi

          printf 'archive=%s\n' "$archive" >> "$GITHUB_OUTPUT"
          printf 'checksum=%s\n' "$checksum" >> "$GITHUB_OUTPUT"

      - name: Build man pages
        id: man
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          set -euo pipefail

          sudo apt-get update
          sudo apt-get install -y help2man

          out_dir="target/$TARGET/$RUST_PROFILE"
          help2man -N "$out_dir/forge" > forge.1
          help2man -N "$out_dir/cast" > cast.1
          help2man -N "$out_dir/anvil" > anvil.1
          help2man -N "$out_dir/chisel" > chisel.1

          gzip forge.1 cast.1 anvil.1 chisel.1
          man_archive="foundry_man_${TAG_NAME}.tar.gz"
          tar -czvf "$man_archive" forge.1.gz cast.1.gz anvil.1.gz chisel.1.gz
          printf 'archive=%s\n' "$man_archive" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
          ARCHIVE: ${{ steps.archive.outputs.archive }}
          CHECKSUM: ${{ steps.archive.outputs.checksum }}
          MAN_ARCHIVE: ${{ steps.man.outputs.archive }}
        shell: bash
        run: |
          set -euo pipefail

          files=("$ARCHIVE" "$CHECKSUM")
          if [[ -n "${MAN_ARCHIVE:-}" ]]; then
            files+=("$MAN_ARCHIVE")
          fi

          gh release upload "$TAG_NAME" "${files[@]}" --clobber

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: [prepare, release]
    if: inputs.publish
    permissions:
      contents: write
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ needs.prepare.outputs.tag_name }}
        shell: bash
        run: gh release edit "$TAG_NAME" --draft=false
